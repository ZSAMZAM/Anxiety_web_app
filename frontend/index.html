<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anxiety Prediction System</title>
    <meta name="description" content="Anxiety Prediction System using Deep Learning" />
    <!-- Theme initialization script to prevent flash of unstyled content -->
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('dashboard-theme');
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const isDark = theme === 'dark' || (theme === null && prefersDark);
          
          const root = document.documentElement;
          if (isDark) {
            root.classList.add('dark');
            root.classList.remove('light');
            root.style.colorScheme = 'dark';
          } else {
            root.classList.remove('dark');
            root.classList.add('light');
            root.style.colorScheme = 'light';
          }
        } catch (e) {
          console.warn('Theme initialization error:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
